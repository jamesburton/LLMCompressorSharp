name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history for version computation

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: HuggingFace cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface/hub
            ~/AppData/Local/huggingface/hub
          key: ${{ runner.os }}-hf-v1
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Restore
        run: dotnet restore LLMCompressorSharp.slnx

      - name: Build
        run: dotnet build LLMCompressorSharp.slnx --no-restore --configuration Release

      - name: Test (CPU only)
        run: >
          dotnet test LLMCompressorSharp.slnx
          --no-build --configuration Release
          --filter "Category!=Gpu"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/**/*.trx
          if-no-files-found: warn
